<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Productivity Tracker</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body,
      #root {
        margin: 0;
        min-height: 540px;
        min-width: 360px;
        width: 360px;
      }

      body {
        background: #09090b;
        color: #f4f4f5;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        overflow-x: hidden;
      }

      .popup-boot {
        align-items: center;
        background: #09090b;
        color: #a1a1aa;
        display: flex;
        font-size: 13px;
        min-height: 540px;
        padding: 16px;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="popup-boot">Loading Productivity Tracker...</div>
    </div>
    <script type="module" src="/src/popup/boot.js"></script>
  </body>
</html>
